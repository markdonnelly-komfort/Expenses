<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#565A5C">
  <title>Komfort - Expenses System</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #404042; --primary-light: #565A5C; --accent: #FDC82F;
      --success: #2e7d32; --warning: #ef6c00; --danger: #c62828; --info: #1565c0;
      --bg: #F4F6F7; --card: #ffffff; --text: #404042; --text-light: #757677;
      --border: #dfe2e4; --shadow: 0 2px 8px rgba(64,64,66,0.12); --sidebar-w: 246px;
    }
    body { font-family: Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4,h5,h6 { color: var(--primary); font-weight: 700; }
    a { color: var(--info); }
    .hidden { display: none !important; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all .2s; text-decoration: none; gap: 8px; }
    .btn-primary { background: var(--primary-light); color: var(--accent); }
    .btn-primary:hover { background: var(--primary); }
    .btn-accent { background: var(--accent); color: var(--primary); }
    .btn-accent:hover { filter: brightness(.95); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-info { background: var(--info); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: var(--accent); }
    .btn-sm { padding: 6px 12px; font-size: 0.825rem; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--text); font-size: 0.875rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: #fff; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media (max-width:600px){ .form-row, .form-row-3 { grid-template-columns: 1fr; } }
    .req::after { content: " *"; color: var(--danger); }
    fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    legend { padding: 0 8px; font-weight: 700; color: var(--primary); font-size: 0.95rem; }

    .card { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .muted { color: var(--text-light); }
    .small { font-size: 0.85rem; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 16px; margin-bottom: 16px; }
    .stat { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 18px; border-left: 5px solid var(--accent); position: relative; }
    .stat .num { font-size: 1.9rem; font-weight: 700; color: var(--primary); }
    .stat.clickable { cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .stat.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(64,64,66,0.18); }
    .stat.clickable::after { content: "›"; position: absolute; top: 12px; right: 14px; color: var(--text-light); font-size: 1.2rem; opacity: .5; }
    .stat .lbl { color: var(--text-light); font-size: 0.85rem; margin-top: 2px; }
    .stat.warn { border-left-color: var(--warning); }
    .stat.ok { border-left-color: var(--success); }
    .stat.info { border-left-color: var(--info); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
    th { background: var(--bg); font-weight: 700; color: var(--primary); white-space: nowrap; }
    tbody tr:hover { background: #fafbfc; }
    td.num, th.num { text-align: right; white-space: nowrap; }
    .clickable { cursor: pointer; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
    .b-green { background: #e3f3e4; color: var(--success); }
    .b-red { background: #fde8e8; color: var(--danger); }
    .b-amber { background: #fff3e0; color: var(--warning); }
    .b-grey { background: #e9ecef; color: var(--text-light); }
    .b-blue { background: #e3f0fb; color: var(--info); }
    .b-yellow { background: var(--accent); color: var(--primary); }

    #login-view { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#404042,#565A5C); padding: 20px; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); padding: 36px; width: 100%; max-width: 410px; border-top: 6px solid var(--accent); }
    .login-sub { text-align: center; color: var(--text-light); margin-bottom: 24px; font-weight:600; letter-spacing:.5px; }
    .login-hint { margin-top: 18px; font-size: 0.78rem; color: var(--text-light); background: var(--bg); border-radius: 8px; padding: 10px 12px; line-height:1.7; }

    #app { display: none; min-height: 100vh; }
    #app.active { display: flex; }
    .sidebar { width: var(--sidebar-w); background: var(--primary); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; transition: transform .25s; }
    .sidebar .brand { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar .brand .sub { font-size: 0.75rem; color: rgba(255,255,255,.6); }
    .nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-section { font-size:.68rem; text-transform:uppercase; letter-spacing:.8px; color:rgba(255,255,255,.4); padding:14px 20px 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: rgba(255,255,255,.82); cursor: pointer; font-size: 0.9rem; border-left: 4px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-item.active { background: rgba(253,200,47,.14); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    .nav-item .ic { width: 20px; text-align: center; }
    .nav-badge { margin-left: auto; background: var(--accent); color: var(--primary); border-radius: 10px; padding: 1px 8px; font-size: 0.72rem; font-weight: 700; }
    .sidebar .who { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.1); font-size: 0.82rem; }
    .sidebar .who .name { color: #fff; font-weight: 600; }
    .sidebar .who .role { color: rgba(255,255,255,.55); font-size:.74rem; }

    .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--primary-light); color: var(--accent); padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 40; border-bottom: 4px solid var(--accent); }
    .topbar h1 { color: var(--accent); font-size: 1.2rem; }
    .topbar .ta { display: flex; gap: 8px; align-items: center; flex-wrap:wrap; justify-content:flex-end; }
    .hamburger { display: none; background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
    .content { padding: 22px; flex: 1; }

    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
    .tab { padding: 10px 16px; cursor: pointer; font-weight: 600; color: var(--text-light); border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 0.9rem; }
    .tab.active { color: var(--primary); border-bottom-color: var(--accent); }
    .tab .cnt { background:var(--border); color:var(--text-light); border-radius:10px; padding:0 7px; font-size:.72rem; margin-left:6px; }
    .tab.active .cnt { background:var(--accent); color:var(--primary); }

    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .toolbar input, .toolbar select { padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: #fff; }
    .toolbar .grow { flex: 1; min-width: 180px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: flex-start; justify-content: center; padding: 30px 16px; overflow-y: auto; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 24px; max-width: 640px; width: 100%; margin: auto; }
    .modal.wide { max-width: 900px; }
    .modal h2 { margin-bottom: 4px; }
    .modal .modal-sub { color: var(--text-light); margin-bottom: 16px; font-size: 0.9rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { padding: 12px 18px; border-radius: 8px; color: #fff; margin-top: 8px; font-weight: 500; box-shadow: var(--shadow); animation: slideIn .3s; max-width:340px; }
    .toast-success { background: var(--success); } .toast-error { background: var(--danger); } .toast-info { background: var(--info); }
    @keyframes slideIn { from { transform: translateX(110%);} to { transform: translateX(0);} }

    .empty { text-align: center; color: var(--text-light); padding: 40px 20px; }
    .empty .ic { font-size: 2.5rem; display: block; margin-bottom: 8px; opacity: .5; }

    .kv { display: grid; grid-template-columns: 200px 1fr; gap: 8px 16px; }
    .kv dt { font-weight: 600; color: var(--text-light); font-size: 0.85rem; }
    .kv dd { font-size: 0.95rem; }
    @media (max-width: 600px){ .kv { grid-template-columns: 1fr; gap: 2px 0; } .kv dd { margin-bottom: 8px; } }

    /* roles chips */
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:2px 10px; font-size:.72rem; font-weight:600; color:var(--text-light); }
    .chip.on { background:var(--accent); color:var(--primary); border-color:var(--accent); }
    label.chk { display:flex; align-items:center; gap:8px; font-weight:600; font-size:.9rem; padding:8px 10px; border:2px solid var(--border); border-radius:8px; cursor:pointer; }
    label.chk input { width:auto; }

    /* segmented */
    .seg { display:inline-flex; border:2px solid var(--border); border-radius:8px; overflow:hidden; }
    .seg button { border:none; background:#fff; padding:9px 16px; cursor:pointer; font-weight:600; color:var(--text-light); font-size:.9rem; }
    .seg button.on { background:var(--primary); color:var(--accent); }

    /* receipts */
    .receipts { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .receipt-thumb { width:74px; height:74px; border:1px solid var(--border); border-radius:8px; overflow:hidden; position:relative; background:var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .receipt-thumb img { width:100%; height:100%; object-fit:cover; }
    .receipt-thumb .doc { font-size:1.8rem; }
    .receipt-thumb .rm { position:absolute; top:-7px; right:-7px; background:var(--danger); color:#fff; border-radius:50%; width:20px; height:20px; border:none; cursor:pointer; font-size:.8rem; line-height:1; }
    .scan-box { background:#fff8e1; border:1px dashed var(--accent); border-radius:8px; padding:10px 12px; font-size:.82rem; margin-top:8px; }

    .totbar { display:flex; gap:20px; flex-wrap:wrap; background:var(--primary); color:#fff; border-radius:10px; padding:14px 18px; margin-bottom:16px; }
    .totbar .t .v { font-size:1.4rem; font-weight:700; color:var(--accent); }
    .totbar .t .l { font-size:.75rem; color:rgba(255,255,255,.7); }

    .trail { border-left:3px solid var(--border); padding-left:14px; margin:6px 0; }
    .trail .step { font-size:.85rem; margin-bottom:8px; position:relative; }
    .trail .step::before { content:''; position:absolute; left:-21px; top:3px; width:11px; height:11px; border-radius:50%; background:var(--border); }
    .trail .step.done::before { background:var(--success); }
    .trail .step.cur::before { background:var(--accent); }

    @media (max-width: 900px){
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-view">
  <div class="login-card">
    <div style="text-align:center"><img src="/logo.svg" alt="Komfort" style="height:64px;margin-bottom:8px;"></div>
    <div class="login-sub">EXPENSES SYSTEM</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input id="login-username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit">Sign in</button>
    </form>
    <div class="login-hint">
      <strong>Demo accounts</strong><br>
      Finance (all roles) — <code>finance</code> / <code>admin123</code><br>
      Manager — <code>manager</code> / <code>manager123</code><br>
      Employee — <code>employee</code> / <code>employee123</code><br>
      Credit-card user — <code>ccuser</code> / <code>ccuser123</code>
    </div>
  </div>
</div>

<!-- ═══════════════ APP SHELL ═══════════════ -->
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="/logo-light.svg" alt="Komfort" style="height:34px;display:block;margin-bottom:4px;">
      <div class="sub">Expenses System</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="who">
      <div class="name" id="who-name"></div>
      <div class="role" id="who-role"></div>
      <button class="btn btn-outline btn-sm" style="margin-top:10px;width:100%;border-color:rgba(255,255,255,.4);color:#fff" onclick="changePassword()">Change password</button>
      <button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%;border-color:rgba(255,255,255,.4);color:#fff" onclick="logout()">Sign out</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="ta" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>
<div class="toast-container" id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA LAYER — IndexedDB (offline/local persistence). Mirrors
// database.js so it can move to the Node backend unchanged.
// ═══════════════════════════════════════════════════════════════
const DB_NAME = 'KomfortExpenses';
const DB_VERSION = 3;
const STORES = ['users','categories','departments','vehicle_types','mileage_rates','advisory_rates','mileage_adjustments','suppliers','vat_rates','reports','lines','payment_runs','settings','audit_log'];
let db = null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      const simple = ['categories','departments','vehicle_types','mileage_rates','advisory_rates','mileage_adjustments','suppliers','vat_rates','payment_runs'];
      simple.forEach(s => { if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'}); });
      if(!d.objectStoreNames.contains('users')){ const s=d.createObjectStore('users',{keyPath:'id'}); s.createIndex('username','username',{unique:true}); }
      if(!d.objectStoreNames.contains('reports')){ const s=d.createObjectStore('reports',{keyPath:'id'}); s.createIndex('user_id','user_id'); s.createIndex('status','status'); }
      if(!d.objectStoreNames.contains('lines')){ const s=d.createObjectStore('lines',{keyPath:'id'}); s.createIndex('report_id','report_id'); }
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
      if(!d.objectStoreNames.contains('audit_log')){ const s=d.createObjectStore('audit_log',{keyPath:'id',autoIncrement:true}); s.createIndex('timestamp','timestamp'); }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e.target.error);
  });
}
const tx = (s,m='readonly') => db.transaction(s,m).objectStore(s);
function idbGetAll(s){ return new Promise((res,rej)=>{ const r=tx(s).getAll(); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbGet(s,k){ return new Promise((res,rej)=>{ const r=tx(s).get(k); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbPut(s,v){ return new Promise((res,rej)=>{ const r=tx(s,'readwrite').put(v); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbDelete(s,k){ return new Promise((res,rej)=>{ const r=tx(s,'readwrite').delete(k); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function idbByIndex(s,idx,val){ return new Promise((res,rej)=>{ const r=tx(s).index(idx).getAll(val); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }

function uuid(){ return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx'.replace(/x/g,()=>Math.floor(Math.random()*16).toString(16)); }
function nowISO(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }
async function sha256(str){ const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
async function logAction(action, details={}){ try{ await idbPut('audit_log',{ id:undefined, timestamp:nowISO(), user:state.user?.username||'system', action, ...details }); }catch(e){} }
async function getSetting(k,f){ const r=await idbGet('settings',k); return r?r.value:f; }
async function setSetting(k,v){ return idbPut('settings',{key:k,value:v}); }

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const ROLES = [
  {key:'employee', label:'Employee'},
  {key:'manager', label:'Manager'},
  {key:'finance', label:'Finance'},
  {key:'credit_card', label:'Credit Card User'},
];
const COMPANY = 'Komfort Partitioning Ltd';
function optionList(opts, current, useEmpty){
  let html = useEmpty ? '<option value="">— Select —</option>' : '';
  return html + opts.map(o=>`<option value="${esc(o.value)}" ${current===o.value?'selected':''}>${esc(o.label)}</option>`).join('');
}

// ═══════════════════════════════════════════════
// SEED DATA
// ═══════════════════════════════════════════════
async function seedDefaults(){
  const users = await idbGetAll('users');
  if (users.length > 0) return;
  await setSetting('company_name', COMPANY);

  const mk = (arr, store, fields) => arr.map(a=>{ const o={id:uuid(),active:1}; fields.forEach((f,i)=>o[f]=a[i]); return o; });

  const vats = mk([['Standard 20%',20],['Reduced 5%',5],['Zero 0%',0],['No VAT',0],['Exempt',0]],'vat_rates',['name','percent']);
  for (const v of vats) await idbPut('vat_rates', v);
  const vatStd = vats[0].id;

  const cats = mk([['Travel','7400'],['Subsistence','7406'],['Accommodation','7402'],['Fuel','7300'],
    ['Office Supplies','7500'],['Client Entertaining','8200'],['Mileage','7404'],['Parking & Tolls','7401'],['Sundry','7906']],'categories',['name','nominal_code']);
  for (const c of cats) await idbPut('categories', c);

  const depts = mk([['Operations','OPS'],['Manufacturing','MFG'],['Sales','SAL'],['Finance','FIN'],
    ['Installation','INS'],['Design','DSN'],['Management','MGT']],'departments',['name','dept_code']);
  for (const d of depts) await idbPut('departments', d);

  // Mileage rate categories + HMRC rates (effective 1 Mar 2026)
  await seedMileageCategoriesAndRates(vatStd);
  await setSetting('mileage_model','v3');

  const sups = ['Shell','BP','Esso','Premier Inn','Travelodge','Greggs','Costa Coffee','Screwfix','Toolstation','National Rail'];
  for (const s of sups) await idbPut('suppliers',{ id:uuid(), name:s, active:1, created_by:'system', created_at:nowISO() });

  // Users with role combinations + approval chain
  const financeId = uuid(), managerId = uuid(), empId = uuid(), ccId = uuid();
  const u = async (id,username,pwd,full,email,roles,dept,a1,a2)=> idbPut('users',{
    id, username, password_hash: await sha256(pwd), full_name:full, email,
    roles, department_id:dept, approver1_id:a1||null, approver2_id:a2||null,
    active:1, must_change_password:false, created_at:nowISO()
  });
  const finDept = depts.find(d=>d.name==='Finance').id;
  const opsDept = depts.find(d=>d.name==='Operations').id;
  const salDept = depts.find(d=>d.name==='Sales').id;
  await u(financeId,'finance','admin123','Helen Foster','h.foster@komfort.com',['employee','manager','finance','credit_card'],finDept,null,null);
  await u(managerId,'manager','manager123','Sarah Mitchell','s.mitchell@komfort.com',['employee','manager','credit_card'],opsDept,null,financeId);
  await u(empId,'employee','employee123','James Okafor','j.okafor@komfort.com',['employee'],opsDept,managerId,financeId);

// Pick the rate for a category that is in force on the claim date (latest effective_from <= date)
async function findApplicableRate(category, claimDate){

// ── Duplicate-claim detection (warning only — never blocks submit/approval) ──
// Expense lines are flagged when same employee + date + supplier + amount.
// Mileage lines are flagged when same employee + date + both postcodes + distance.
function _isDuplicate(a, b){
  if (a.line_type !== b.line_type) return false;
  if (a.line_date !== b.line_date) return false;
  if (a.line_type === 'expense'){
    return !!a.supplier_id && a.supplier_id === b.supplier_id && Math.abs(Number(a.amount||0) - Number(b.amount||0)) < 0.01;
  }
  return !!a.postcode_from && a.postcode_from === b.postcode_from && a.postcode_to === b.postcode_to
         && Math.abs(Number(a.distance_miles||0) - Number(b.distance_miles||0)) < 1;
}
async function findDuplicateMatch(line, ownerId){
  const reports = await idbByIndex('reports', 'user_id', ownerId);
  for (const r of reports){
    for (const l of await idbByIndex('lines', 'report_id', r.id)){
      if (l.id === line.id) continue;
      if (_isDuplicate(line, l)) return { line:l, report:r };
    }
  }
  return null;
}
async function findDuplicatesFor(targetLines, ownerId){
  const reports = await idbByIndex('reports', 'user_id', ownerId);
  const all = [];
  for (const r of reports) for (const l of await idbByIndex('lines', 'report_id', r.id)) all.push({ l, r });
  const out = new Map();
  for (const t of targetLines){
    for (const { l, r } of all){
      if (l.id === t.id) continue;
      if (_isDuplicate(t, l)){ out.set(t.id, { line:l, report:r }); break; }
    }
  }
  return out;
}
function dupBadge(dup){
  if (!dup) return '';
  const where = `Possible duplicate of a ${dup.line.line_type} dated ${fmtDate(dup.line.line_date)} in “${dup.report.title}”`;
  return `<span class="badge b-amber" title="${esc(where).replace(/"/g,'&quot;')}" style="margin-left:6px">⚠ Duplicate?</span>`;
}

// ── Tax year (UK: 6 April – 5 April) + mileage tracking ──
const AMAP_THRESHOLD = 10000;
function taxYearOf(dateStr){ const d=new Date(dateStr||today()); const y=d.getFullYear(); const start=new Date(y,3,6); const sy = d>=start ? y : y-1; return `${sy}/${String(sy+1).slice(2)}`; }
function taxYearBounds(ty){ const sy=Number(String(ty).split('/')[0]); return { start:`${sy}-04-06`, end:`${sy+1}-04-05`, label:ty, sy }; }
function recentTaxYears(n=4){ const cur=taxYearOf(today()); const sy=Number(cur.split('/')[0]); const out=[]; for(let i=0;i<n;i++){ const y=sy-i; out.push(`${y}/${String(y+1).slice(2)}`); } return out; }
async function allMileageLinesFor(userId){
  const reports = await idbByIndex('reports','user_id',userId);
  const out=[];
  for (const r of reports){ for (const l of await reportLines(r.id)){ if(l.line_type==='mileage'){ l._report=r; out.push(l); } } }
  return out;
}
// Cumulative APPROVED (own-car) miles in the tax year before a given claim date — used for the 10k split.
// Counts own-car mileage lines dated earlier than the claim, plus all finance adjustments for that tax year.
async function approvedMilesBefore(userId, claimDate, excludeLineId){
  const ty = taxYearOf(claimDate); const b = taxYearBounds(ty);
  let miles=0;
  for (const l of await allMileageLinesFor(userId)){
    if (l.id===excludeLineId || l.company_car) continue;
    if (!l.line_date || l.line_date<b.start || l.line_date>b.end) continue;
    if (l.line_date < claimDate) miles += Number(l.distance_miles)||0;
  }
  const adj = (await idbGetAll('mileage_adjustments')).filter(a=>a.user_id===userId && a.tax_year===ty);
  adj.forEach(a=> miles += Number(a.miles)||0);
  return round2(miles);
}

let _lineReceipts = [];

function receiptsInputHtml(){
  return `<div class="form-group"><label>Receipts (photo or file)</label>
    <input type="file" id="rc-input" accept="image/*,application/pdf" multiple capture="environment" onchange="addReceipts(event)">

}
function renderReceiptThumbs(){
  const box = document.getElementById('rc-thumbs'); if(!box) return;
  box.innerHTML = _lineReceipts.map((r,i)=>{
    const inner = (r.mime||'').startsWith('image/') ? `<img src="${r.data}" alt="">` : `<span class="doc">📄</span>`;
    return `<div class="receipt-thumb" data-preview-src="${esc(r.data)}" data-preview-mime="${esc(r.mime||'')}" onclick="viewReceipt(${i})">${inner}<button class="rm" onclick="event.stopPropagation();removeReceipt(${i})">×</button></div>`;
  }).join('') || '<span class="small muted">No receipts attached.</span>';
}
function addReceipts(e){
  const files = [...e.target.files];
  let pending = files.length;
  if(!pending) return;
  files.forEach(f=>{
    const reader = new FileReader();
    reader.onload = () => { _lineReceipts.push({ name:f.name, mime:f.type, data:reader.result }); if(--pending===0) renderReceiptThumbs(); };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}
function removeReceipt(i){ _lineReceipts.splice(i,1); renderReceiptThumbs(); }
function viewReceipt(i){
  const r=_lineReceipts[i]; if(!r) return;
  const w=window.open(); if(w){ w.document.write((r.mime||'').startsWith('image/')?`<img src="${r.data}" style="max-width:100%">`:`<iframe src="${r.data}" style="width:100%;height:100vh;border:none"></iframe>`); }

// ── Excel export (HTML-table .xls; opens natively in Excel) ──
function downloadExcel(filename, sheetName, headers, rows, title){
  const cell = v => `<td>${v==null?'':String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</td>`;
  const head = `<tr style="background:#404042;color:#FDC82F;font-weight:bold">${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
  const body = rows.map(r=>`<tr>${r.map(cell).join('')}</tr>`).join('');
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8">
    <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>${sheetName}</x:Name>
    <x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
    </head><body><table border="1"><tr><td colspan="${headers.length}" style="font-size:15px;font-weight:bold;color:#404042">${esc(COMPANY)} — ${esc(title||sheetName)}</td></tr>
    <tr><td colspan="${headers.length}" style="color:#757677">Generated ${new Date().toLocaleString('en-GB')}</td></tr><tr></tr>
    ${head}${body}</table></body></html>`;
  const blob = new Blob([html], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename.endsWith('.xls')?filename:filename+'.xls'; a.click(); URL.revokeObjectURL(a.href);
}

function mileageRateDesc(l){

  if (Number(l.miles_over)>0 && Number(l.miles_under)>0) return `${round2(l.miles_under)} mi @ ${l.rate_up}p + ${round2(l.miles_over)} mi @ ${l.rate_over}p`;

function approvalTrailHtml(r){
  const isCCt = r.type==='creditcard';
  const steps = [];
  steps.push({ label:'Created / submitted', done:!!r.submitted_at, info:r.submitted_at?fmtDate(r.submitted_at):'' });
  steps.push({ label:'Manager approval', done:!!r.manager_approved_at, cur:r.status==='awaiting_manager', info:r.manager_approved_at?`${userName(r.manager_approved_by)} · ${fmtDate(r.manager_approved_at)}`:'' });
  steps.push({ label:'Finance approval', done:!!r.finance_approved_at, cur:r.status==='awaiting_finance', info:r.finance_approved_at?`${userName(r.finance_approved_by)} · ${fmtDate(r.finance_approved_at)}`:'' });
  if (!isCCt) steps.push({ label:'Reimbursed', done:!!r.reimbursed_at, cur:r.status==='awaiting_reimbursement', info:r.reimbursed_at?fmtDate(r.reimbursed_at):'' });
  return `<div class="card"><h3 style="margin-bottom:10px">Approval progress</h3><div class="trail">
    ${steps.map(s=>`<div class="step ${s.done?'done':''} ${s.cur?'cur':''}"><strong>${s.label}</strong>${s.info?` <span class="muted">— ${esc(s.info)}</span>`:''}</div>`).join('')}
  </div></div>`;
}

async function recalcExpenseVat(){
  if (_vatManual) return;   // respect a manually-entered VAT amount
  const amt = numVal('el-amount'); const vid = val('el-vat-rate');
  const vats = await refAll('vat_rates'); const v = vats.find(x=>x.id===vid);
  const pct = v ? Number(v.percent) : 0;
  const vat = pct>0 ? round2(amt * pct/(100+pct)) : 0;
  const f = document.getElementById('el-vat'); if(f) f.value = vat.toFixed(2);
}

let _mlCalc = null;   // last computed { amount, vat, rate, under, over }
async function recalcMileage(){
  const dist = numVal('ml-dist'); const cat = val('ml-cat'); const date = val('ml-date'); const company = !!document.getElementById('ml-company')?.checked;
  const rate = (cat && date) ? await findApplicableRate(cat, date) : null;
  const vats = await refAll('vat_rates');
  // populate the read-only rate boxes
  const setRO=(id,v)=>{ const e=document.getElementById(id); if(e) e.value=v; };
  setRO('ml-rate-up', rate?`${rate.rate_pence}p/mi`:'—');
  setRO('ml-rate-over', rate?`${rate.rate_over_pence}p/mi`:'—');
  setRO('ml-rate-adv', rate?`${rate.afr_pence}p/mi`:'—');
  const bd = document.getElementById('ml-breakdown');
  let amount=0, vat=0, under=0, over=0, note='';
  if (!rate){ note = cat?`No mileage rate is effective on ${fmtDate(date)} for “${esc(cat)}”. Add one under Mileage Rates.`:'Select a mileage rate category.'; }
  else {
    const v = vats.find(x=>x.id===rate.vat_rate_id); const pct = v?Number(v.percent):20;
    const adv = Number(rate.afr_pence)||0;
    if (company){
      amount = round2(dist * adv/100);
      note = `Company car / allowance — ${dist||0} mi × ${adv}p (advisory) = ${fmtMoney(amount)}`;
    } else {
      const cum = await approvedMilesBefore(_mlOwnerId, date, _mlEditId);
      under = Math.max(0, Math.min(dist, AMAP_THRESHOLD - cum));
      over = round2(dist - under);
      amount = round2(under*Number(rate.rate_pence)/100 + over*Number(rate.rate_over_pence)/100);
      if (over>0 && under>0) note = `Own car — crosses the 10,000-mile threshold: ${round2(under)} mi @ ${rate.rate_pence}p + ${over} mi @ ${rate.rate_over_pence}p = ${fmtMoney(amount)}. <span class="muted">(${round2(cum)} mi already this tax year → ${round2(cum+dist)} mi)</span>`;
      else if (over>0) note = `Own car — over 10,000 miles: ${over} mi @ ${rate.rate_over_pence}p = ${fmtMoney(amount)}. <span class="muted">(${round2(cum)} mi already this tax year)</span>`;
      else note = `Own car — ${round2(under)} mi @ ${rate.rate_pence}p = ${fmtMoney(amount)}. <span class="muted">(${round2(cum)} mi already this tax year → ${round2(cum+dist)} mi)</span>`;
    }
    if (adv>0) vat = round2(dist * adv/100 * (pct/(100+pct)));
  }
  if (bd) bd.innerHTML = note;
  const ad = document.getElementById('ml-amount-d'); if (ad) ad.textContent = fmtMoney(amount);
  const al = document.getElementById('ml-amount-l'); if (al) al.textContent = company ? 'Amount payable (advisory rate)' : 'Amount payable (approved rate)';
  if (!_mvatManual){ const vf = document.getElementById('ml-vat'); if (vf) vf.value = vat.toFixed(2); }
  _mlCalc = { amount, vat: _mvatManual?round2(numVal('ml-vat')):vat, rate, under:round2(under), over:round2(over) };
  return _mlCalc;
}
async function estimateDistance(){
  const a = val('ml-from'), b = val('ml-to');
  if(!a||!b){ toast('Enter both postcodes','error'); return; }
  try{
    const f = await fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(a));
    const t = await fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(b));
    const fj = await f.json(), tj = await t.json();
    if(fj.status!==200||tj.status!==200){ toast('Postcode not found — enter distance manually','error'); return; }
    let d = haversine(fj.result.latitude,fj.result.longitude,tj.result.latitude,tj.result.longitude)*1.3; // road factor
    const isReturn = !!document.getElementById('ml-return')?.checked;
    if (isReturn) d *= 2;
    document.getElementById('ml-dist').value = d.toFixed(1);
    recalcMileage();
    toast(isReturn ? 'Estimated round-trip distance — please verify' : 'Estimated road distance — please verify');
  }catch(e){ toast('Could not estimate (offline?) — enter distance manually','error'); }
}
function haversine(lat1,lon1,lat2,lon2){ const R=3958.8, toR=x=>x*Math.PI/180; const dLat=toR(lat2-lat1),dLon=toR(lon2-lon1); const x=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }

// ── Receipt OCR (auto-scan) ──
let _tesseract = null;
function loadTesseract(){
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload=()=>res(window.Tesseract); s.onerror=()=>rej(new Error('load failed')); document.head.appendChild(s); });
}
function loadPdfJs(){
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  return new Promise((res,rej)=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
    s.onload = () => { try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; } catch(e){} res(window.pdfjsLib); };
    s.onerror = () => rej(new Error('load failed'));
    document.head.appendChild(s);
  });
}
function dataURLtoUint8Array(dataUrl){
  const b64 = (dataUrl||'').split(',')[1] || '';
  const bin = atob(b64); const u = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) u[i] = bin.charCodeAt(i);
  return u;
}
async function pdfFirstPageToImage(dataUrl){
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: dataURLtoUint8Array(dataUrl) }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/png');
}
// Extract embedded text directly from a PDF (lossless on digital receipts — no OCR involved).
// Groups items by approximate y-position so reconstructed lines preserve receipt layout.
async function pdfExtractText(dataUrl){
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: dataURLtoUint8Array(dataUrl) }).promise;
  let out = '';
  const pageCount = Math.min(pdf.numPages, 3);
  for (let i=1;i<=pageCount;i++){
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    // Items have transform[5]=y. Group by ~y to make readable lines.
    const items = (c.items||[]).map(it=>({ s:(it.str||''), x:it.transform?.[4]||0, y:Math.round(it.transform?.[5]||0) }));
    items.sort((a,b)=>(b.y-a.y) || (a.x-b.x));
    let lastY=null, line=[];
    const lines = [];
    items.forEach(it=>{
      if (lastY===null || Math.abs(it.y-lastY) > 3){
        if (line.length) lines.push(line.join(' ').replace(/\s+/g,' ').trim());
        line=[];
      }
      lastY = it.y;
      if (it.s.trim()) line.push(it.s);
    });
    if (line.length) lines.push(line.join(' ').replace(/\s+/g,' ').trim());
    out += lines.filter(Boolean).join('\n') + '\n';
  }
  return out.trim();
}
// Upscale + grayscale image to improve Tesseract accuracy (~targets ~300 DPI)
async function preprocessForOcr(dataUrl, scale=2){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = Math.max(800, img.naturalWidth*scale);
      c.height = Math.round(img.naturalHeight * (c.width / img.naturalWidth));
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, c.width, c.height);
      // Light grayscale + contrast tweak
      const d = ctx.getImageData(0, 0, c.width, c.height);
      const px = d.data;
      for (let i=0;i<px.length;i+=4){
        const y = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
        const v = Math.max(0, Math.min(255, (y - 128)*1.15 + 128));
        px[i]=px[i+1]=px[i+2]=v;
      }
      ctx.putImageData(d, 0, 0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function ocrImage(dataUrl){
  let T; try { T = await loadTesseract(); }
  catch(e){ toast('Auto-scan needs an internet connection — enter details manually','error'); throw e; }
  let prepped = dataUrl;
  try { prepped = await preprocessForOcr(dataUrl, 2); } catch(e){}
  const { data } = await T.recognize(prepped, 'eng');
  return data.text || '';
}
async function runReceiptScan(){
  const r = _lineReceipts.find(x=>(x.mime||'').startsWith('image/')) || _lineReceipts.find(x=>(x.mime||'').toLowerCase().includes('pdf'));
  if(!r){ toast('Attach a receipt photo or PDF first','error'); return; }
  toast('Scanning receipt…','info');
  let text = '';
  const isPdf = (r.mime||'').toLowerCase().includes('pdf');
  if (isPdf){
    // 1) Try pdf.js text extraction first — accurate on digital PDFs
    try { text = await pdfExtractText(r.data); } catch(e){ /* fall through */ }
    // If the PDF has no embedded text (scanned image), fall back to render + OCR
    if (!text || text.replace(/\s/g,'').length < 30){
      let imageData;
      try { imageData = await pdfFirstPageToImage(r.data); }
      catch(e){ toast('Could not read the PDF — needs internet on first scan, or enter manually','error'); return; }
      try { text = await ocrImage(imageData); }
      catch(e){ toast('Could not read the receipt — enter details manually','error'); return; }
    }
  } else {
    try { text = await ocrImage(r.data); }
    catch(e){ return; }   // ocrImage already toasted
  }
  parseReceiptText(text);
  toast('Scan complete — please check the fields');
}
function parseReceiptText(text){
  const rawLines = text.split(/\n/).map(s=>s.trim()).filter(Boolean);
  // Extract money amounts (£12.34, GBP 12.00, 1,234.56, 18.00).
  // Trailing \b prevents greedy matches like "24,202" out of "May 24, 2026".
  const moneyRe = /(?:£|gbp\s*)?(\d{1,3}(?:,\d{3})+(?:\.\d{2})?|\d{1,6}\.\d{2})\b(?!\d)/ig;
  const lineInfo = rawLines.map(l=>{
    const amounts = []; let m;
    const re = new RegExp(moneyRe.source, 'ig');
    while ((m = re.exec(l))){ const v = parseFloat(m[1].replace(/,/g,'')); if (!isNaN(v)) amounts.push(v); }
    const lower = l.toLowerCase();
    const isSubtotal = /\bsubtotal\b/.test(lower) || /\btotal\s+excluding\b/.test(lower) || /\bexcl(?:uding)?\s*(?:vat|tax)\b/.test(lower) || /\bnet\s*total\b/.test(lower);
    return {
      raw:l, lower, amounts, isSubtotal,
      isTotal: !isSubtotal && (/(^|\W)total\b/.test(lower) || /\bamount\s*paid\b/.test(lower) || /\bamount\s*due\b/.test(lower) || /\bbalance\s*due\b/.test(lower) || /\bto\s*pay\b/.test(lower) || /\bgrand\s*total\b/.test(lower)),
      isVat: /\bvat\b|\bsales\s*tax\b/.test(lower),
    };
  });
  // ── Total amount: take the LAST money on a "Total/Amount paid" line (rightmost = final figure) ──
  let pickedAmount = NaN;
  const totalLines = lineInfo.filter(li=>li.isTotal && !li.isVat && li.amounts.length);
  if (totalLines.length){
    const amountPaid = totalLines.filter(li=>/\bamount\s*paid\b/.test(li.lower));
    const pool = amountPaid.length ? amountPaid : totalLines;
    pickedAmount = Math.max(...pool.map(li=>li.amounts[li.amounts.length-1]));
  } else {
    const candidates = lineInfo.filter(li=>!li.isVat && !li.isSubtotal).flatMap(li=>li.amounts);
    if (candidates.length) pickedAmount = Math.max(...candidates);
  }
  if (!isNaN(pickedAmount)){ const f=document.getElementById('el-amount'); if(f) f.value = pickedAmount.toFixed(2); }
  // ── VAT amount: LAST money on the VAT line (e.g. "VAT (20% on £15.00) £3.00").
  // If the result looks implausible (more than ~35% of the gross), discard and fall back
  // to auto-recalc — OCR probably missed the actual VAT figure and only caught the basis.
  const vatLine = lineInfo.find(li=>li.isVat && li.amounts.length);
  let vatPicked = null;
  if (vatLine){
    const v = vatLine.amounts[vatLine.amounts.length-1];
    if (!isNaN(pickedAmount) && v > pickedAmount * 0.35) {
      // implausible — likely the basis, not the VAT
    } else { vatPicked = v; }
  }
  if (vatPicked != null){ const vf=document.getElementById('el-vat'); if(vf) vf.value = vatPicked.toFixed(2); }
  else recalcExpenseVat();
  // ── Date ──
  applyParsedDate(text);
  // ── Supplier ──
  const sup = detectSupplier(rawLines);
  if (sup){ const ni=document.getElementById('el-supplier-new'); if (ni){ ni.classList.remove('hidden'); ni.value = sup.slice(0,60); document.getElementById('el-supplier').value=''; } }
}
function applyParsedDate(text){
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const set = iso => { if (!isNaN(new Date(iso).getTime())){ const f=document.getElementById('el-date'); if(f) f.value=iso; } };
  let m;
  // dd/mm/yyyy or dd-mm-yy
  m = text.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if (m){ let [, d, mo, y] = m; if (y.length===2) y='20'+y; return set(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`); }
  // 24 May 2026 / 24th May 2026
  m = text.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{4})\b/i);
  if (m){ const mo = months.indexOf(m[2].toLowerCase().slice(0,3))+1; return set(`${m[3]}-${String(mo).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`); }
  // May 24, 2026
  m = text.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{1,2}),?\s+(\d{4})\b/i);
  if (m){ const mo = months.indexOf(m[1].toLowerCase().slice(0,3))+1; return set(`${m[3]}-${String(mo).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`); }
}
function detectSupplier(lines){
  // 1) Company-suffix match (e.g. "Anthropic, PBC" / "Acme Tools Ltd" / "X Inc")
  const suffix = /([A-Z][A-Za-z0-9&'’\- .]{1,50}?(?:,?\s*(?:PBC|Inc\.?|LLC|Ltd\.?|Limited|Corp\.?|Corporation|Co\.?|GmbH|S\.?A\.?|N\.?V\.?|B\.?V\.?|plc|PLC|Pty\.?\s*Ltd\.?)))(?:[\s,]|$)/;
  for (const l of lines){ const m = l.match(suffix); if (m) return m[1].trim(); }
  // 2) Plausible top-of-receipt brand line
  const skipRe = /(^|\b)(receipt|invoice|order\s*no|date\b|bill\s*to|sold\s*to|payment|payment\s*history|amount|total|subtotal|vat|gst|sales\s*tax|paid\s*on|paid\b|description|qty|unit|price|tax\b|receipt\s*number|invoice\s*number|date\s*paid|due\s*date|invoice\s*date|order\s*date|customer)(\b|$)/i;
  const isEmail = l => /@/.test(l);
  const isUrl = l => /https?:\/\/|www\./i.test(l);
  const isPriceLine = l => /£|gbp|\$\s?\d|\b\d+\.\d{2}\b/i.test(l);
  for (let i=0;i<Math.min(15,lines.length);i++){
    const l = lines[i];
    if (!/[A-Za-z]{3,}/.test(l)) continue;
    if (skipRe.test(l)) continue;
    if (isEmail(l) || isUrl(l)) continue;
    if (/^\s*\d/.test(l)) continue;     // address-style lines often start with a number
    if (isPriceLine(l)) continue;
    return l.slice(0,60);
  }
  return null;
}

async function exportReport(id){

  const lines = (await reportLines(id)).sort((a,b)=>(a.line_date||'').localeCompare(b.line_date||''));
  const cats = await refAll('categories'); const sups = await refAll('suppliers'); const vats = await refAll('vat_rates');
  const headers = ['Date','Type','Supplier/Journey','Category','Nominal','VAT rate','Net','VAT','Gross','Description','Vehicle','Reg','Miles','Receipts'];
  const rows = lines.map(l=>{
    const cat = cats.find(c=>c.id===l.category_id);
    return [ l.line_date, l.line_type==='mileage'?'Mileage':'Expense',
      l.line_type==='mileage'?`${l.postcode_from} > ${l.postcode_to}`:nameById(sups,l.supplier_id),
      l.line_type==='mileage'?'Mileage':(cat?.name||''), l.line_type==='mileage'?'':(cat?.nominal_code||''),
      nameById(vats,l.vat_rate_id), round2((l.amount||0)-(l.vat_amount||0)).toFixed(2), (l.vat_amount||0).toFixed(2), (l.amount||0).toFixed(2),
      l.description, (l.vehicle_type||'')+(l.company_car?' (Company car)':''), l.vehicle_reg||'', l.distance_miles||'', (l.receipts||[]).length ];
  });
  const t = lineTotals(lines);
  rows.push(['','','','','','TOTAL', t.net.toFixed(2), t.vat.toFixed(2), t.gross.toFixed(2),'','','','','']);
  downloadExcel(`${r.title.replace(/[^\w]+/g,'_')}.xls`, 'Report', headers, rows, r.title+' — '+userName(r.user_id));
}

async function mileageSummary(userId, ty){
  const b = taxYearBounds(ty);
  const lines = (await allMileageLinesFor(userId)).filter(l=>l.line_date>=b.start && l.line_date<=b.end);
  let own=0, company=0, amount=0, vat=0;
  lines.forEach(l=>{ const mi=Number(l.distance_miles)||0; if(l.company_car) company+=mi; else own+=mi; amount+=Number(l.amount)||0; vat+=Number(l.vat_amount)||0; });
  const adj = (await idbGetAll('mileage_adjustments')).filter(a=>a.user_id===userId && a.tax_year===ty);
  const adjMiles = adj.reduce((s,a)=>s+(Number(a.miles)||0),0);
  const approvedTotal = own + adjMiles;
  return { lines, adj, own:round2(own), company:round2(company), adjMiles:round2(adjMiles), total:round2(own+company),
    approvedTotal:round2(approvedTotal), remaining:round2(Math.max(0,AMAP_THRESHOLD-approvedTotal)), amount:round2(amount), vat:round2(vat) };
}

  await idbPut('mileage_adjustments',{ id:uuid(), user_id:userId, tax_year:ty, miles, date:val('ma-date')||today(), note:val('ma-note'), created_by:state.user.id, created_at:nowISO() });

async function exportMileageTracker(ty, userId){
  const users = await idbGetAll('users');
  const targets = userId ? users.filter(u=>u.id===userId) : users.sort((a,b)=>a.full_name.localeCompare(b.full_name));
  const headers=['Employee','Tax year','Own-car miles','Company miles','Adjustment miles','Total miles','Approved total','Remaining to 10k','Amount paid (£)','VAT (£)'];
  const rows=[];
  for (const u of targets){ const s=await mileageSummary(u.id, ty); if(userId||s.total>0||s.adjMiles>0) rows.push([u.full_name,ty,s.own,s.company,s.adjMiles,s.total,s.approvedTotal,s.remaining,s.amount.toFixed(2),s.vat.toFixed(2)]); }
  downloadExcel(`mileage_tracker_${String(ty).replace('/','-')}.xls`,'Mileage',headers,rows,'Mileage tracker '+ty);
}

async function openApproval(id, stage){
  state.currentReportId = id;
  const r = await idbGet('reports', id);
  const lines = (await reportLines(id)).sort((a,b)=>(a.line_date||'').localeCompare(b.line_date||''));
  const cats = await refAll('categories'); const sups = await refAll('suppliers'); const t = lineTotals(lines);
  const dups = await findDuplicatesFor(lines, r.user_id);
  const rowsHtml = lines.map(l=>{ const dup = dupBadge(dups.get(l.id));
    return `<tr><td>${fmtDate(l.line_date)}</td><td>${l.line_type==='mileage'?'<span class="badge b-blue">Mileage</span>':'<span class="badge b-yellow">Expense</span>'}${dup}</td>
    <td>${l.line_type==='mileage'?esc(l.postcode_from)+' → '+esc(l.postcode_to):esc(nameById(sups,l.supplier_id))}<div class="small muted">${esc(l.description)||''}</div></td>

    <td class="num">${fmtMoney(l.vat_amount)}</td><td class="num">${fmtMoney(l.amount)}</td><td>${receiptCountBadge(l)}</td></tr>`; }).join('');
  const dupNotice = dups.size ? `<div class="scan-box" style="background:#fff3e0;border-color:var(--warning)"><strong>⚠ ${dups.size} possible duplicate${dups.size>1?'s':''}</strong> — review the flagged line${dups.size>1?'s':''} before approving. This is a warning only; you can still approve.</div>` : '';
  openModal(`<h2>${esc(r.title)}</h2><div class="modal-sub">${esc(userName(r.user_id))} · ${r.type==='creditcard'?'Credit card':'Expense'} · Total <strong>${fmtMoney(t.gross)}</strong> (VAT ${fmtMoney(t.vat)})</div>
    ${dupNotice}
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Detail</th><th>Category/Vehicle</th><th class="num">VAT</th><th class="num">Amount</th><th>Rcpt</th></tr></thead><tbody>${rowsHtml}</tbody></table></div>
    <div class="form-group" style="margin-top:14px"><label>Note (required if returning)</label><textarea id="ap-note" rows="2"></textarea></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="rejectReport('${id}')">Return to employee</button>
      <button class="btn btn-success" onclick="approveReport('${id}','${stage}')">Approve</button></div>`, true);
}
async function approveReport(id, stage){
  const r = await idbGet('reports', id);
  const owner = state.usersById[r.user_id];
  if (stage==='manager'){
    r.manager_approved_by = state.user.id; r.manager_approved_at = nowISO();
    r.status = owner?.approver2_id ? 'awaiting_finance' : (r.type==='creditcard'?'approved':'awaiting_reimbursement');
    if (r.status!=='awaiting_finance'){ r.finance_approved_by=state.user.id; r.finance_approved_at=nowISO(); }
  } else {
    r.finance_approved_by = state.user.id; r.finance_approved_at = nowISO();
    r.status = r.type==='creditcard' ? 'approved' : 'awaiting_reimbursement';
  }
  await idbPut('reports', r); await logAction('report_approved',{report_id:id,stage});
  closeModal(); toast('Approved'); navigate(state.page);
}
async function rejectReport(id){
  const note = val('ap-note'); if(!note){ toast('Please add a note explaining what to change','error'); return; }
  const r = await idbGet('reports', id);
  r.status='rejected'; r.rejected_by=state.user.id; r.rejected_at=nowISO(); r.rejection_note=note;
  await idbPut('reports', r); await logAction('report_rejected',{report_id:id});
  closeModal(); toast('Returned to employee'); navigate(state.page);
}

async function createPaymentRun(){
  const reports = await idbGetAll('reports');
  const due = [];
  for (const r of reports){ if (r.type==='expense' && r.status==='awaiting_reimbursement'){ r._t=lineTotals(await reportLines(r.id)); due.push(r); } }
  if(!due.length){ toast('Nothing to pay','error'); return; }
  const total = round2(due.reduce((s,r)=>s+r._t.gross,0));
  const ref = 'PR-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(Math.random()*900+100);
  openModal(`<h2>Create payment run</h2><div class="modal-sub">${due.length} report(s) · ${fmtMoney(total)}</div>
    <div class="form-row"><div class="form-group"><label>Reference</label><input id="pr-ref" value="${ref}"></div>
      <div class="form-group"><label>Payment date</label><input type="date" id="pr-date" value="${today()}"></div></div>
    <div class="table-wrap"><table><thead><tr><th>Report</th><th>Owner</th><th class="num">Amount</th></tr></thead><tbody>
      ${due.map(r=>`<tr><td>${esc(r.title)}</td><td>${esc(userName(r.user_id))}</td><td class="num">${fmtMoney(r._t.gross)}</td></tr>`).join('')}
      <tr><td colspan="2"><strong>Total</strong></td><td class="num"><strong>${fmtMoney(total)}</strong></td></tr></tbody></table></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="confirmPaymentRun()">Confirm &amp; mark reimbursed</button></div>`, true);
}
async function confirmPaymentRun(){
  const reports = await idbGetAll('reports');
  const due = [];
  for (const r of reports){ if (r.type==='expense' && r.status==='awaiting_reimbursement'){ r._t=lineTotals(await reportLines(r.id)); due.push(r); } }
  const total = round2(due.reduce((s,r)=>s+r._t.gross,0));
  const runId = uuid();
  const runDate = val('pr-date') || today();
  await idbPut('payment_runs',{ id:runId, reference:val('pr-ref')||('PR-'+today().replace(/-/g,'')), run_date:runDate, created_by:state.user.id, total, status:'completed', notes:'', report_ids: due.map(r=>r.id), created_at:nowISO() });
  for (const r of due){ r.status='reimbursed'; r.reimbursed_at=runDate; r.payment_run_id=runId; await idbPut('reports', r); }
  await logAction('payment_run',{ run_id:runId, count:due.length, total });
  closeModal(); toast(`Payment run created — ${due.length} report(s) reimbursed`); navigate('payment-runs');
}

async function renderAnalytics(c){
  const reports = await idbGetAll('reports');
  const allLines = await idbGetAll('lines');
  const cats = await refAll('categories'); const depts = await refAll('departments'); const sups = await refAll('suppliers'); const vats = await refAll('vat_rates');
  const linesByReport = {}; allLines.forEach(l=>{ (linesByReport[l.report_id]=linesByReport[l.report_id]||[]).push(l); });
  // Aggregations — track net, VAT and gross per key
  const byUser={}, byCat={}, byDept={};
  const bump = (m,k,g,v) => { const o = m[k] || (m[k]={net:0,vat:0,gross:0}); o.gross+=g; o.vat+=v; o.net += g-v; };
  let gross=0, vat=0;
  reports.forEach(r=>{
    const ls = linesByReport[r.id]||[]; const owner=state.usersById[r.user_id];
    ls.forEach(l=>{
      const g=Number(l.amount)||0, v=Number(l.vat_amount)||0; gross+=g; vat+=v;
      bump(byUser, r.user_id, g, v);
      const ck = l.line_type==='mileage'?'Mileage':(cats.find(x=>x.id===l.category_id)?.name||'Uncategorised'); bump(byCat, ck, g, v);
      const dk = depts.find(d=>d.id===owner?.department_id)?.name||'Unassigned'; bump(byDept, dk, g, v);
    });
  });
  const tbl = (obj, kind, fmtKey) => Object.entries(obj).sort((a,b)=>b[1].gross-a[1].gross).map(([k,o])=>
    `<tr class="clickable" onclick="drillAgg('${kind}','${encodeURIComponent(k)}')">
      <td>${esc(fmtKey?fmtKey(k):k)}</td>
      <td class="num">${fmtMoney(o.net)}</td><td class="num">${fmtMoney(o.vat)}</td><td class="num"><strong>${fmtMoney(o.gross)}</strong></td>
      <td>›</td></tr>`).join('') || '<tr><td colspan="5" class="muted">No data</td></tr>';
  setTopbar(`<button class="btn btn-accent" onclick="exportAllLines()">Export all expenses (Excel)</button>`);
  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat clickable" onclick="window._acStatus='';navigate('all-claims')"><div class="num">${fmtMoney(round2(gross-vat))}</div><div class="lbl">Total net spend</div></div>
      <div class="stat info"><div class="num">${fmtMoney(round2(vat))}</div><div class="lbl">Total VAT</div></div>
      <div class="stat clickable" onclick="window._acStatus='';navigate('all-claims')"><div class="num">${fmtMoney(round2(gross))}</div><div class="lbl">Total gross</div></div>
      <div class="stat ok clickable" onclick="window._acStatus='';navigate('all-claims')"><div class="num">${reports.length}</div><div class="lbl">Reports</div></div>
    </div>
    <div class="muted small" style="margin-bottom:12px">Tip: click any row below to see the underlying expense lines, then click a line to open the report.</div>
    <div class="form-row">
      <div class="card"><div class="card-head"><h3>Spend by employee</h3><button class="btn btn-sm btn-outline" onclick="exportAgg('user')">Excel</button></div>
        <div class="table-wrap"><table><thead><tr><th>Employee</th><th class="num">Net</th><th class="num">VAT</th><th class="num">Gross</th><th></th></tr></thead><tbody>${tbl(byUser,'user',userName)}</tbody></table></div></div>
      <div class="card"><div class="card-head"><h3>Spend by category</h3><button class="btn btn-sm btn-outline" onclick="exportAgg('cat')">Excel</button></div>
        <div class="table-wrap"><table><thead><tr><th>Category</th><th class="num">Net</th><th class="num">VAT</th><th class="num">Gross</th><th></th></tr></thead><tbody>${tbl(byCat,'cat')}</tbody></table></div></div>
    </div>
    <div class="card"><div class="card-head"><h3>Spend by department</h3><button class="btn btn-sm btn-outline" onclick="exportAgg('dept')">Excel</button></div>
      <div class="table-wrap"><table><thead><tr><th>Department</th><th class="num">Net</th><th class="num">VAT</th><th class="num">Gross</th><th></th></tr></thead><tbody>${tbl(byDept,'dept')}</tbody></table></div></div>`;
  window._agg = { byUser, byCat, byDept };
}
async function drillAgg(kind, encKey){
  const key = decodeURIComponent(encKey);
  const reports = await idbGetAll('reports'); const rById={}; reports.forEach(r=>rById[r.id]=r);
  const lines = await idbGetAll('lines'); const cats = await refAll('categories'); const depts = await refAll('departments'); const sups = await refAll('suppliers');
  const match = (l)=>{ const r=rById[l.report_id]||{}; const owner=state.usersById[r.user_id];
    if(kind==='user') return r.user_id===key;
    if(kind==='cat'){ const ck=l.line_type==='mileage'?'Mileage':(cats.find(x=>x.id===l.category_id)?.name||'Uncategorised'); return ck===key; }
    if(kind==='dept'){ const dk=depts.find(d=>d.id===owner?.department_id)?.name||'Unassigned'; return dk===key; }
    return false; };
  const ls = lines.filter(match).sort((a,b)=>(b.line_date||'').localeCompare(a.line_date||''));
  let gross=0, vat=0;
  const rowsHtml = ls.map(l=>{ const r=rById[l.report_id]||{}; const g=Number(l.amount)||0; const v=Number(l.vat_amount)||0; gross+=g; vat+=v;
    return `<tr class="clickable" onclick="closeModal();openReport('${r.id}')"><td>${fmtDate(l.line_date)}</td><td>${esc(r.title||'')}</td><td>${esc(userName(r.user_id))}</td><td>${l.line_type==='mileage'?'Mileage: '+esc(l.postcode_from)+'→'+esc(l.postcode_to):esc(nameById(sups,l.supplier_id))}</td>
      <td class="num">${fmtMoney(g-v)}</td><td class="num">${fmtMoney(v)}</td><td class="num"><strong>${fmtMoney(g)}</strong></td><td>›</td></tr>`; }).join('');
  const title = kind==='user'?userName(key):key;
  openModal(`<h2>${esc(title)}</h2><div class="modal-sub">${ls.length} line(s) · Net ${fmtMoney(round2(gross-vat))} · VAT ${fmtMoney(round2(vat))} · Gross ${fmtMoney(round2(gross))}</div>
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Report</th><th>Employee</th><th>Detail</th><th class="num">Net</th><th class="num">VAT</th><th class="num">Gross</th><th></th></tr></thead><tbody>${rowsHtml||'<tr><td colspan="8" class="muted">No lines.</td></tr>'}</tbody></table></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`, true);
}
function exportAgg(which){
  const a = window._agg||{};
  const map = which==='user' ? a.byUser : which==='cat' ? a.byCat : a.byDept;
  if (!map) return;
  const keyLabel = which==='user' ? 'Employee' : which==='cat' ? 'Category' : 'Department';
  const fmtKey = which==='user' ? userName : (k=>k);
  const rows = Object.entries(map).sort((x,y)=>y[1].gross-x[1].gross)
    .map(([k,o])=>[fmtKey(k), o.net.toFixed(2), o.vat.toFixed(2), o.gross.toFixed(2)]);
  // total row
  const tot = Object.values(map).reduce((s,o)=>({net:s.net+o.net,vat:s.vat+o.vat,gross:s.gross+o.gross}),{net:0,vat:0,gross:0});
  rows.push(['TOTAL', tot.net.toFixed(2), tot.vat.toFixed(2), tot.gross.toFixed(2)]);
  const titles = { user:'Spend by employee', cat:'Spend by category', dept:'Spend by department' };
  const files = { user:'spend_by_employee.xls', cat:'spend_by_category.xls', dept:'spend_by_department.xls' };
  downloadExcel(files[which], 'Spend', [keyLabel,'Net (£)','VAT (£)','Gross (£)'], rows, titles[which]);
}

    ${users.map(u=>`<tr><td><strong>${esc(u.full_name)}</strong><div class="small muted">${esc(u.email||'')}</div></td><td>${esc(u.username)}</td>
      <td><div class="chips">${ROLES.map(r=>`<span class="chip ${u.roles.includes(r.key)?'on':''}">${r.label}</span>`).join('')}</div></td>
      <td>${esc(nameById(depts,u.department_id))}</td><td>${esc(userName(u.approver1_id))}</td><td>${esc(userName(u.approver2_id))}</td>
      <td>${u.active?'<span class="badge b-green">Active</span>':'<span class="badge b-grey">Disabled</span>'}</td>
      <td><button class="btn btn-sm btn-outline" onclick="editUser('${u.id}')">Edit</button>
      <button class="btn btn-sm btn-outline" onclick="resetPwd('${u.id}')">Reset PW</button></td></tr>`).join('')}
  </tbody></table></div></div>`;
}
async function editUser(id){
  const users = await idbGetAll('users');
  const rec = id ? users.find(u=>u.id===id) : { roles:['employee'], active:1 };
  const depts = await ref('departments');
  const managers = users.filter(u=>u.roles.includes('manager'));
  const finance = users.filter(u=>u.roles.includes('finance'));
  openModal(`<h2>${id?'Edit':'Add'} user</h2>
    <div class="form-row"><div class="form-group"><label class="req">Full name</label><input id="u-name" value="${esc(rec.full_name||'')}"></div>
      <div class="form-group"><label class="req">Username</label><input id="u-username" value="${esc(rec.username||'')}" ${id?'readonly':''}></div></div>
    <div class="form-row"><div class="form-group"><label>Email</label><input id="u-email" value="${esc(rec.email||'')}"></div>
      <div class="form-group"><label>${id?'New password (leave blank to keep)':'Password'}</label><input id="u-pwd" type="text" placeholder="${id?'unchanged':'set a password'}"></div></div>
    <div class="form-group"><label>Roles</label><div class="form-row" style="grid-template-columns:1fr 1fr">
      ${ROLES.map(r=>`<label class="chk"><input type="checkbox" class="u-role" value="${r.key}" ${rec.roles?.includes(r.key)?'checked':''}> ${r.label}</label>`).join('')}
    </div></div>
    <div class="form-group"><label>Department</label><select id="u-dept">${optionList(depts.map(d=>({value:d.id,label:`${d.name} (${d.dept_code||''})`})), rec.department_id, true)}</select></div>
    <fieldset><legend>Approval routing</legend>
      <div class="form-row">
        <div class="form-group"><label>1st approver (manager)</label><select id="u-app1">${optionList(managers.map(m=>({value:m.id,label:m.full_name})), rec.approver1_id, true)}</select><div class="small muted">Receives the report first.</div></div>
        <div class="form-group"><label>2nd approver (finance)</label><select id="u-app2">${optionList(finance.map(m=>({value:m.id,label:m.full_name})), rec.approver2_id, true)}</select><div class="small muted">Final sign-off.</div></div>
      </div></fieldset>
    ${id?`<label class="chk"><input type="checkbox" id="u-active" ${rec.active?'checked':''}> Account active</label>`:''}
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveUser('${id}')">Save</button></div>`, true);
}
async function saveUser(id){
  const name=val('u-name'), username=val('u-username').toLowerCase();
  if(!name||!username){ toast('Name and username required','error'); return; }
  const roles=[...document.querySelectorAll('.u-role:checked')].map(x=>x.value);
  if(!roles.length){ toast('Select at least one role','error'); return; }
  const users = await idbGetAll('users');
  if(!id && users.some(u=>u.username===username)){ toast('Username already exists','error'); return; }
  const rec = id ? users.find(u=>u.id===id) : { id:uuid(), created_at:nowISO(), must_change_password:true };
  rec.full_name=name; rec.username=username; rec.email=val('u-email'); rec.roles=roles;
  rec.department_id=val('u-dept'); rec.approver1_id=val('u-app1')||null; rec.approver2_id=val('u-app2')||null;
  rec.active = id ? (document.getElementById('u-active')?.checked?1:0) : 1;
  const pwd = val('u-pwd');
  if (pwd) rec.password_hash = await sha256(pwd);
  else if (!id) rec.password_hash = await sha256('changeme');
  await idbPut('users', rec); await refreshCaches(); closeModal(); navigate('adm-users');
  toast(id?'User updated':'User created');
}
async function resetPwd(id){
  const np = prompt('Enter a new password for this user:'); if(!np) return;
  const u = await idbGet('users', id); u.password_hash = await sha256(np); u.must_change_password=true; await idbPut('users', u);
  toast('Password reset');
}

// HOVER PREVIEW for receipt thumbnails
// ═══════════════════════════════════════════════
function setupReceiptHoverPreview(){
  if (document.getElementById('receipt-preview')) return;
  const el = document.createElement('div'); el.id='receipt-preview';
  el.style.cssText='position:fixed;display:none;z-index:3000;pointer-events:none;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.3);padding:6px;border-radius:10px;max-width:520px;max-height:520px';
  document.body.appendChild(el);
  const place = e => {
    const W=520, H=520;
    let x = e.clientX + 18, y = e.clientY + 18;
    if (x + W > innerWidth) x = Math.max(8, e.clientX - W - 18);
    if (y + H > innerHeight) y = Math.max(8, innerHeight - H - 8);
    el.style.left = x+'px'; el.style.top = y+'px';
  };
  document.addEventListener('mouseover', e => {
    const t = e.target.closest && e.target.closest('.receipt-thumb'); if(!t) return;
    const src = t.dataset.previewSrc, mime = t.dataset.previewMime||'';
    if (!src || !mime.startsWith('image/')) return;   // PDFs don't get a hover preview
    el.innerHTML = `<img src="${src}" style="max-width:500px;max-height:500px;display:block;border-radius:6px">`;
    el.style.display = 'block'; place(e);
  });
  document.addEventListener('mousemove', e => { if (el.style.display==='block') place(e); });
  document.addEventListener('mouseout', e => {
    const t = e.target.closest && e.target.closest('.receipt-thumb'); if(!t) return;
    const to = e.relatedTarget; if (to && t.contains(to)) return;
    el.style.display='none'; el.innerHTML='';
  });
}

// INIT
// ═══════════════════════════════════════════════
(async function init(){
  try {
    await openDB();
    await seedDefaults();
    await ensureMileageModelV3();
    await migrateDemoCcuserRoles();
    setupReceiptHoverPreview();
    const sid = sessionStorage.getItem('exp_session');
    if (sid){ const u = await idbGet('users', sid); if (u && u.active){ state.user = u; await enterApp(); } }
  } catch(err){ console.error('Init failed', err); toast('Failed to start: '+err.message,'error'); }
})();
</script>
